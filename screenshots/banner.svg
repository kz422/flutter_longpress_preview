<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0d1130"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="popup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative glow circles -->
  <circle cx="1160" cy="-40" r="240" fill="#6366f1" opacity="0.07"/>
  <circle cx="920"  cy="340" r="200" fill="#818cf8" opacity="0.05"/>
  <circle cx="30"   cy="290" r="140" fill="#6366f1" opacity="0.04"/>

  <!-- ── Phone illustration ── -->
  <!-- Body -->
  <rect x="892" y="28" width="148" height="244" rx="24"
        fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>
  <!-- Screen -->
  <rect x="905" y="52" width="122" height="202" rx="12"
        fill="rgba(255,255,255,0.04)"/>

  <!-- Background app rows (dimmed) -->
  <rect x="914" y="66"  width="104" height="11" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="914" y="84"  width="104" height="11" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="914" y="102" width="104" height="11" rx="4" fill="rgba(255,255,255,0.07)"/>

  <!-- Blur overlay (simulate backdrop) -->
  <rect x="905" y="52" width="122" height="202" rx="12"
        fill="rgba(13,17,48,0.35)"/>

  <!-- Preview popup card -->
  <rect x="912" y="86" width="106" height="118" rx="12"
        fill="url(#popup)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Popup image area -->
  <rect x="912" y="86" width="106" height="50" rx="12"
        fill="rgba(255,255,255,0.08)"/>
  <!-- Notch bottom corners of image area -->
  <rect x="912" y="123" width="106" height="13" fill="rgba(255,255,255,0.08)"/>

  <!-- Popup text lines -->
  <rect x="920" y="144" width="72" height="7" rx="3" fill="rgba(255,255,255,0.75)"/>
  <rect x="920" y="157" width="86" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="920" y="169" width="62" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>

  <!-- Divider -->
  <rect x="912" y="185" width="106" height="1" fill="rgba(255,255,255,0.12)"/>

  <!-- Action row -->
  <text x="965" y="198"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle">Open</text>

  <!-- ── Text content ── -->
  <!-- Package name -->
  <text x="60" y="126"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    flutter_longpress_preview
  </text>

  <!-- Tagline -->
  <text x="63" y="168"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="20" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">
    Safari-inspired Peek &amp; Pop previews for Flutter
  </text>

  <!-- Feature pills -->
  <rect x="63"  y="203" width="148" height="30" rx="15" fill="url(#pill)" stroke="rgba(129,140,248,0.45)" stroke-width="1"/>
  <text x="137" y="223"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle">Widget preview</text>

  <rect x="221" y="203" width="162" height="30" rx="15" fill="url(#pill)" stroke="rgba(129,140,248,0.45)" stroke-width="1"/>
  <text x="302" y="223"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle">OGP link preview</text>

  <rect x="393" y="203" width="122" height="30" rx="15" fill="url(#pill)" stroke="rgba(129,140,248,0.45)" stroke-width="1"/>
  <text x="454" y="223"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle">Image preview</text>
</svg>
